<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTMBangla AI Companion</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-area">
        <img src="icon.png" alt="Logo" class="app-logo">
        <div class="title-meta">
          <h2>AI Companion</h2>
          <span class="status-badge" id="status-text">Scanning tab...</span>
        </div>
      </div>
      <button class="settings-btn" id="settings-toggle" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </header>

    <!-- Settings Panel -->
    <div class="settings-panel collapsed" id="settings-panel">
      <h3>Configuration</h3>
      <div class="form-group">
        <label for="backend-url">Backend API Host</label>
        <input type="text" id="backend-url" placeholder="http://localhost:3004">
        <p class="help-text">Point this to your running local/remote AI Service.</p>
      </div>
      <button class="save-settings-btn" id="settings-save">Save & Connect</button>
    </div>

    <!-- Chat Area -->
    <div class="chat-container">
      <div class="messages" id="chat-messages">
        <!-- Message greetings will be added dynamically -->
      </div>
      
      <!-- Quick Actions -->
      <div class="quick-actions" id="quick-actions">
        <button class="action-tag" data-prompt="Summarize this page in a short paragraph.">⚡ Summarize Page</button>
        <button class="action-tag" data-prompt="What are the key takeaways or requirements listed on this page?">📌 Key Takeaways</button>
        <button class="action-tag" data-prompt="Explain the main topic or purpose of this page.">💡 Explain Topic</button>
      </div>
    </div>

    <!-- Footer Input -->
    <footer class="input-footer">
      <div class="input-wrapper">
        <input type="text" id="chat-input" placeholder="Ask about this page..." autocomplete="off">
        <button class="send-btn" id="chat-send" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
